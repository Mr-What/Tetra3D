# $Id: printer.cfg,v 1.7 2026/05/14 21:07:36 aaron Exp aaron $
# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v2.0. To use this config, the firmware should be compiled for the
# STM32F103 with a "28KiB bootloader" and USB communication. Also,
# select "Enable extra low-level configuration options" and configure
# "GPIO pins to set at micro-controller startup" to "!PA14".

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

# See docs/Config_Reference.md for a description of parameters.

# This setup is for the experimental tetrahedral 3D printer,
# which uses the tilted_delta kinematic model, available at:
#
#    https://github.com/Mr-What/klipper/tree/tilted-delta-kinematics-dev
#
# The master of this project is intended to track the master at
# https://github.com/Klipper3d/klipper
# The deviation from the official klipper master is tracked in the
# tilted-delta-kinematics-dev  branch of https://github.com/Mr-What/klipper
#
# calibration tools and drawings are in the Tetra3D project:
# https://github.com/Mr-What/Tetra3D

[printer]
kinematics: tilted_delta
max_velocity: 300  # mm/s
max_accel: 800
#max_z_velocity: 5  a little slower than XY for delta, but not much slower
#max_z_accel: 100
print_radius: 80
delta_angles: 209.914345, 329.717780, 89.802627
delta_radius: 163.175247, 163.175247, 163.175247
arm_lengths: 285.962246, 285.929667, 287.159928
tilt_radial: 12.818539, 13.000136, 13.205502
tilt_tangential: -0.082508, 0.211575, 0.034973
#z_offset: -1.0 # actual Z distance when bed probe triggers (mm)  I think this may be z_offset in [probe] section
minimum_z_position: -15   # not used in kinematics, but needs to be negative for bed probes, which can be negative Z


[stepper_a]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
# try to have endstops NC, so that they fail triggered, no motion
# if they are wired NO, when a wire comes off, they could crash
endstop_pin: PC0
position_min: 113
position_endstop: 472.7520
#position_max: 477   # slightly above position_endstop
homing_speed: 50   # mm/s
homing_retract_dist: 5
homing_retract_speed: 30
second_homing_speed: 10

[stepper_b]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: PC1
position_min: 112
position_endstop: 472.1518
#position_max: 474    # slightly above position_endstop
homing_speed: 50
homing_retract_dist: 5
homing_retract_speed: 30
second_homing_speed: 10

[stepper_c]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 40
endstop_pin: PC2
position_min: 114
position_endstop: 473.9537
#position_max: 482
homing_speed: 50  # mm/s
homing_retract_dist: 5
homing_retract_speed: 30
second_homing_speed: 10

[tmc2209 stepper_a]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[tmc2209 stepper_b]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[tmc2209 stepper_c]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

#[delta_calibrate]
#radius: 80

# put this back when we hook up bowden extruder
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD2
microsteps: 16
rotation_distance: 6.633  # gearhead rotation << motor rotation
nozzle_diameter: 0.2
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 500
min_extrude_temp: 2 #160
#max_extrude_temp: 275
max_extrude_only_distance: 200
max_extrude_only_velocity: 40
max_extrude_only_accel: 1000

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.35 # typical is 0.6 to 0.9
stealthchop_threshold: 30
sense_resistor: 0.11  # guess at .11 Ohm sense for 2209 on most BTT boards
hold_current: 0.2
interpolate: True

# uncomment if/when we get a heated bed
#[heater_bed]
#heater_pin: PC9
#sensor_type: ATC Semitec 104GT-2
#sensor_pin: PC3
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
#min_temp: -200
#max_temp: 3130

[probe]
pin: ^PC14 # normally closed
x_offset: 0.0
y_offset: 0.0
z_offset: -0.365 
speed: 10.0
samples: 3
sample_retract_dist: 3.0

[gcode_arcs]
resolution: 0.5 # mm

[heater_fan heatbreak_cooling_fan]
pin: PC7

[fan]
pin: PC6

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_30FFDA054754343040811557-if00
# serial: /dev/ttyACM0

[force_move]
enable_force_move: True

[static_digital_output usb_pullup_enable]
pins: !PA14

[verify_heater extruder]
max_error: 999999
check_gain_time: 999999
hysteresis: 999999

#[verify_heater heater_bed]
#max_error: 999999
#check_gain_time: 999999
#hysteresis: 999999


[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

[include mainsail.cfg]
[include tetraMacros.cfg]
